name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        service: [frontend, backend, nginx]
    steps:
      - uses: actions/checkout@v4

      - name: Registry namespace (ghcr image paths must be lowercase)
        id: registry
        run: |
          o=$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          echo "owner=$o" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

      - name: Login to GHCR日本語
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ steps.registry.outputs.owner }}
          password: ${{ secrets.GITHUB_TOKEN || secrets.GHCR_PAT || secrets.PAT }}

      - name: Build and Push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.registry.outputs.owner }}/mullhouse:mullhouse-${{ matrix.service }}
